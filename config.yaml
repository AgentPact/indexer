# yaml-language-server: $schema=./node_modules/envio/evm.schema.json

name: agentpact-indexer
description: Canonical chain-event indexer and projection layer for AgentPact
field_selection:
  transaction_fields:
    - hash

networks:
  - id: 84532
    rpc_config:
      url: https://sepolia.base.org
    start_block: 39921316
    contracts:
      - name: AgentPactEscrow
        address:
          - 0x0285930cAD4EAbed9D2f8eF4e0cd9d3dD9e0772c
        handler: src/EventHandlers.ts
        events:
          - event: EscrowCreated(uint256 indexed escrowId, address indexed requester, bytes32 taskHash, uint256 rewardAmount, uint256 requesterDeposit, address token, uint64 deliveryDurationSeconds, uint8 maxRevisions, uint8 acceptanceWindowHours, uint8 criteriaCount)
          - event: TaskClaimed(uint256 indexed escrowId, address indexed provider, uint64 deliveryDeadline)
          - event: TaskSuspendedAfterDeclines(uint256 indexed escrowId, uint8 declineCount)
          - event: TaskAbandoned(uint256 indexed escrowId, address indexed provider)
          - event: DeliverySubmitted(uint256 indexed escrowId, bytes32 deliveryHash, uint8 revision, uint64 acceptanceDeadline)
          - event: DeliveryAccepted(uint256 indexed escrowId, uint256 providerPayout, uint256 platformFee)
          - event: RevisionRequested(uint256 indexed escrowId, bytes32 reasonHash, bytes32 criteriaResultsHash, uint8 currentRevision, uint256 depositPenalty, uint8 passRate)
          - event: TaskAutoSettled(uint256 indexed escrowId, uint8 passRate, uint256 providerShare, uint256 requesterRefund, uint256 platformFee)
          - event: TaskCancelled(uint256 indexed escrowId, uint256 compensation)
          - event: TimeoutClaimed(uint256 indexed escrowId, uint8 previousState, address indexed claimedBy)
      - name: AgentPactTipJar
        address:
          - 0xd11438C44F62AB4A6f234c9269778951813e1e1D
        handler: src/EventHandlers.ts
        events:
          - event: TipSent(address indexed from, address indexed to, uint256 amount, uint256 fee, string postId)
